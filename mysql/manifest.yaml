apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-pod
  labels:
    project: expense
    env: dev
spec:
  replicas: 2
selector:
  matchLabels:
    project: expense
    env: dev
  template:
    metadata:
      labels:
        project: expense
        env: dev
    spec:
    containers:
    - name: nginx
      image: kavya478/mysql:2.0

---

apiVersion: v1
kind: service
metadata:
  name: pod-spec
  labels:
    project: expense
    env: dev
 
spec:
  type: LoadBalancer
  selector:
    project: expense
    env: dev
  ports:
  - protocol: TCP
    port: 80
    nodePort: 32676
    targetPort: 80