apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: expense
  labels:
    project: expense
    env: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      project: expense
      env: dev
  template:
    metadata:
      labels:
        project: expense
        env: dev
    spec:
      containers:
      - name: nginx
        image: kavya478/mysql:2.0

---

apiVersion: v1
kind: Service
metadata:
  name: mysql
  labels:
    project: expense
    env: dev
 
spec:

  selector:
    project: expe
    env: dev
  ports:
  - protocol: TCP
    port: 3306
   
    targetPort: 3306

