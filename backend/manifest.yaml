

apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-pod
  namespace: expense
  labels:
    project: expense
    env: dev
    component: backend
spec:
  replicas: 2
selector:
  matchLabels:
    project: expense
    env: dev
  template:
  metadata:
    
    labels:
      project: expense
      env: dev
      component: backend
  spec:
    containers:
    - name: nginx
      image: kavya478/backend:2.0

---

apiVersion: v1
kind: service
metadata:
  name: pod-spec
  labels:
    project: expense
    env: dev
 
spec:
  selector:
    project: expense
    env: dev
    component: backend
  ports:
  - protocol: TCP
    port: 8080
   
    targetPort: 8080