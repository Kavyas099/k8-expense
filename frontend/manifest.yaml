kind: Deployment
apiVersion: apps/v1
metadata:
  name: deply-frontend
  labels:
    project: expense
    env: dev
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels: 
      project: expense
      env: dev
      component: frontend
  template:
    metadata:
    
    labels:
      project: expense
      env: dev
      component: frontend
    containers:
    - name: nginx
      image: kavya478/backend:2.0

---

kind: Service
apiVersion: v1
metadata:
  name: sv-pod
spec:
  type: LoadBalancer
  selectors:
    project: expense
    env: dev
    component: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
    nodePort: 32786