kind: Deployment
apiVersion: apps/v1
metadata:
  name: frontend
  namespace: expense
  labels:
    project: expense
    env: frontend
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels: 
      project: expense
      env: frontend
      component: frontend
  template:
    metadata:
      labels:
        project: expense
        env: frontend
        component: frontend
    spec:
      containers:
      - name: nginx
        image: kavya478/frontend:2.0
        ports:
        - containerPort: 8080

---

kind: Service
apiVersion: v1
metadata:
  name: frontend
spec:
  type: LoadBalancer
  selectors:
    project: expense
    env: frontend
    component: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
    